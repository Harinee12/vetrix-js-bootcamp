    <style>
      * {

        box-sizing: border-box;

      }

      body {
        background: #f5f7fb;
        padding: 40px;

        margin-bottom: 40px;
      }

      .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        text-align: center;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card h2 {
        margin-bottom: 20px;
        color: #2563eb;
      }

      a {
        text-decoration: none;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }

      footer {
        margin-top: 50px;
        text-align: center;
        color: gray;
      }
    </style>
